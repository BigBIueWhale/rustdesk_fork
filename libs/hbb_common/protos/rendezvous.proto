syntax = "proto3";
package hbb;

// R-D4 / R-SV4 / R-SV10 / §8 (direct-IP only — dial nobody): the entire RendezvousMessage wire
// protocol is REMOVED. Upstream's ~210-line oneof — RegisterPeer / RegisterPeerResponse /
// PunchHoleRequest / PunchHole / PunchHoleSent / PunchHoleResponse / FetchLocalAddr / LocalAddr /
// ConfigUpdate / RegisterPk / RegisterPkResponse / SoftwareUpdate / RequestRelay / RelayResponse /
// TestNatRequest / TestNatResponse / PeerDiscovery / OnlineRequest / OnlineResponse / KeyExchange /
// HealthCheck / HttpProxyRequest / HttpProxyResponse, plus the NatType enum — was the
// rendezvous/relay/NAT-punch/online-status/health-check/http-proxy signalling protocol. The fork
// dials no rendezvous, relay or STUN broker (R-SV4): it had ZERO senders tree-wide and its sole
// reader (common.rs `get_next_nonkeyexchange_msg`) was itself dead (zero callers). Gone, not merely
// unused — the binary can no longer encode or parse a rendezvous message.
//
// What remains are the two types still used on the DIRECT path (kept verbatim — same field
// numbers/enum values, so the generated code for them is unchanged):
//   - ConnType:           the connection type carried in LoginRequest / used throughout the client.
//   - ControlPermissions: the per-connection permission bitset (the Permission enum) the responder
//                         grants and the viewer reads.
//
// The file keeps its name and the `rendezvous_proto` module alias (lib.rs `pub use protos::rendezvous
// as rendezvous_proto`) to avoid churning the many `rendezvous_proto::*` glob imports; it is now just
// these shared types, with no rendezvous protocol.

enum ConnType {
  DEFAULT_CONN = 0;
  FILE_TRANSFER = 1;
  PORT_FORWARD = 2;
  RDP = 3;
  VIEW_CAMERA = 4;
  TERMINAL = 5;
}

message ControlPermissions {
  enum Permission {
    keyboard = 0;
    remote_printer = 1;
    clipboard = 2;
    file = 3;
    audio = 4;
    camera = 5;
    terminal = 6;
    tunnel = 7;
    restart = 8;
    recording = 9;
    block_input = 10;
    remote_modify = 11;
    privacy_mode = 12;
  }
  uint64 permissions = 1;
}
